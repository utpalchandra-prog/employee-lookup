<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="EmpLookup">
<title>Employee Lookup</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:16px}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:#666;margin-bottom:20px}
  .btn{padding:10px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
  .btn:active{opacity:.75}
  .btn-outline{padding:8px 14px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:12px;cursor:pointer}
  .btn-link{background:none;border:none;color:#378ADD;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
  input[type=text],input[type=search]{width:100%;padding:10px 14px;font-size:14px;border:1px solid #ddd;border-radius:10px;background:#fff;outline:none;font-family:inherit}
  input[type=text]:focus,input[type=search]:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.12)}
  .cpf-input{letter-spacing:.05em;text-transform:uppercase;font-family:monospace}
  .search-row{display:flex;gap:8px;margin-bottom:10px}
  .search-row input{flex:1}
  /* Cards */
  .card{background:#fff;border-radius:14px;border:1px solid #eee;padding:16px;margin-bottom:12px}
  .emp-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .avatar{width:46px;height:46px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#185FA5;flex-shrink:0}
  .emp-name{font-size:15px;font-weight:600;line-height:1.3}
  .emp-desig{font-size:12px;color:#666;margin-top:2px}
  .emp-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;padding-top:12px;border-top:1px solid #f0f0f0}
  .meta-item label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
  .meta-item span{font-size:13px;font-weight:500}
  .meta-item.full{grid-column:1/-1}
  /* Key dates */
  .dates-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
  .date-box label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
  .date-box span{font-size:12px;font-weight:500}
  .date-box.full{grid-column:1/-1}
  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid #e5e5e5;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;white-space:nowrap}
  .tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
  /* Records */
  .record{background:#fff;border:1px solid #eee;border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .rec-num{display:inline-block;background:#f0f0f0;color:#555;font-size:10px;font-weight:600;border-radius:4px;padding:2px 6px;margin-bottom:6px}
  .rec-title{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.4}
  .rec-sub{font-size:12px;color:#444;margin-bottom:3px}
  .rec-univ{font-size:12px;color:#378ADD;font-style:italic;margin-bottom:5px}
  .rec-code{font-size:11px;color:#888;font-family:monospace;margin-bottom:5px}
  .rec-dates{display:flex;gap:20px;padding-top:8px;border-top:1px solid #f0f0f0}
  .date-item label{font-size:10px;color:#999;display:block;text-transform:uppercase;letter-spacing:.04em}
  .date-item span{font-size:12px;font-weight:500}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .badge{font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:6px;padding:3px 8px;color:#555}
  .empty{text-align:center;padding:24px 0;color:#aaa;font-size:13px}
  /* Timeline style for postings/levels */
  .timeline{position:relative;padding-left:20px}
  .timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:#e5e5e5;border-radius:2px}
  .tl-item{position:relative;margin-bottom:10px}
  .tl-dot{position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#378ADD;border:2px solid #fff;box-shadow:0 0 0 1px #378ADD}
  .tl-dot.current{background:#22c55e;box-shadow:0 0 0 1px #22c55e}
  .tl-content{background:#fff;border:1px solid #eee;border-radius:10px;padding:9px 12px}
  .tl-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .tl-date{font-size:11px;color:#888}
  .tl-badge{display:inline-block;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:600;border-radius:4px;padding:2px 7px;margin-bottom:4px}
  /* Name search results */
  .name-result{background:#fff;border:1px solid #eee;border-radius:11px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
  .name-result:active{border-color:#378ADD;background:#f0f7ff}
  .name-result-name{font-size:13px;font-weight:600;margin-bottom:4px}
  .name-result-meta{display:flex;flex-wrap:wrap;gap:5px}
  .name-tag{font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:5px;padding:2px 7px;color:#555}
  .name-tag.cpf{background:#E6F1FB;color:#185FA5;border-color:#B3D4F5;font-family:monospace}
  /* Alerts */
  .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;line-height:1.6}
  .alert-warn{background:#FFF8E1;border:1px solid #FFE082;color:#7A5800}
  /* Upload */
  .drop-zone{border:2px dashed #ccc;border-radius:14px;padding:28px 16px;text-align:center;background:#fff;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
  .drop-zone:hover,.drop-zone.drag{border-color:#378ADD}
  .drop-icon{font-size:36px;margin-bottom:8px}
  .drop-title{font-size:15px;font-weight:600;margin-bottom:4px}
  .drop-sub{font-size:12px;color:#888;line-height:1.6}
  /* Loading */
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-wrap{background:#f0f0f0;border-radius:999px;height:6px;margin:12px 0 6px;overflow:hidden}
  .progress-bar{height:6px;border-radius:999px;background:#378ADD;transition:width .4s}
  /* File bar */
  .file-bar{background:#E8F5E9;border:1px solid #C8E6C9;border-radius:10px;padding:9px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .file-bar span{font-size:11px;color:#2E7D32;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .file-bar-btns{display:flex;gap:6px;flex-shrink:0}
  /* Debug */
  .debug-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:12px;font-size:11px;font-family:monospace;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-all;display:none}
  /* Install banner */
  .install-banner{background:#EDE7F6;border:1px solid #B39DDB;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:none;align-items:center;gap:10px}
  .install-banner p{font-size:13px;color:#4527A0;flex:1;margin:0}
  .install-banner button{background:#673AB7;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;flex-shrink:0}
  /* Search mode toggle */
  .mode-toggle{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:12px;gap:3px}
  .mode-btn{flex:1;padding:7px;font-size:12px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;transition:all .15s}
  .mode-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  /* Years filter */
  .years-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:9px 13px;margin-bottom:10px}
  .years-bar span{font-size:13px;color:#555}
  .years-bar input{width:52px;padding:5px 8px;font-size:14px;font-weight:600;border:1px solid #ddd;border-radius:8px;text-align:center;outline:none;font-family:inherit}
  .highlight{background:#fff3cd;border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div class="app">
  <h1>👤 Employee Lookup</h1>
  <p class="sub">ONGC Employee Records Dashboard</p>

  <div class="install-banner" id="install-banner">
    <p>📱 Install this app on your home screen!</p>
    <button onclick="installApp()">Install</button>
  </div>

  <div id="upload-section">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📊</div>
      <div class="drop-title">Load your Excel file</div>
      <div class="drop-sub">Tap to browse<br>Sheet1 · Sheet2 · Sheet3 · Sheet4</div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xlsm,.xls" style="display:none">
  </div>

  <div id="loading-section" style="display:none">
    <div class="card" style="text-align:center;padding:28px 16px">
      <div class="spinner"></div>
      <p id="load-msg" style="font-size:14px;font-weight:500;margin:12px 0 4px">Reading file…</p>
      <div class="progress-wrap"><div class="progress-bar" id="prog" style="width:5%"></div></div>
      <p id="load-sub" style="font-size:12px;color:#888;margin:0">Please wait</p>
    </div>
  </div>

  <div id="main-section" style="display:none">
    <div class="file-bar">
      <span id="file-label">✓ Data loaded</span>
      <div class="file-bar-btns">
        <button class="btn-outline" onclick="reloadFile()">🔄 Update</button>
        <button class="btn-outline" onclick="clearCache()" style="color:#c00">✕</button>
      </div>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-cpf" onclick="setMode('cpf')">🔢 Search by CPF</button>
      <button class="mode-btn" id="mode-name" onclick="setMode('name')">🔤 Search by Name</button>
    </div>

    <div id="cpf-section">
      <div class="search-row">
        <input type="text" id="cpf-input" class="cpf-input" placeholder="Enter CPF No" maxlength="8" onkeydown="if(event.key==='Enter')doLookup()">
        <button class="btn" onclick="doLookup()">Search</button>
      </div>
      <div class="years-bar">
        <span style="flex:1">📅 Show training from last</span>
        <input type="number" id="years-input" value="5" min="1" max="99" onchange="if(db) { var v=document.getElementById('cpf-input').value; if(v) doLookup(); }">
        <span>years only</span>
      </div>
    </div>

    <div id="name-section" style="display:none">
      <div class="search-row">
        <input type="search" id="name-input" placeholder="Type name e.g. Sandeep Agarwal" oninput="doNameSearch()">
      </div>
      <div id="name-results"></div>
    </div>

    <button class="btn-link" onclick="toggleDebug()" style="margin-bottom:10px;display:block">🔍 Diagnostics</button>
    <div class="debug-box" id="debug-box"></div>
    <div id="result-area"></div>
  </div>
</div>

<script>
var db=null, debugInfo='', deferredPrompt=null, currentMode='cpf';
var IDB_NAME='EmpLookupDB2', IDB_STORE='files', IDB_KEY='excel';

function openIDB(){return new Promise(function(res,rej){var r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=function(e){e.target.result.createObjectStore(IDB_STORE);};r.onsuccess=function(e){res(e.target.result);};r.onerror=rej;});}
function saveToIDB(buf,name){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put({buf:buf,name:name,date:new Date().toLocaleDateString()},IDB_KEY);tx.oncomplete=res;tx.onerror=rej;});});}
function loadFromIDB(){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readonly');var r=tx.objectStore(IDB_STORE).get(IDB_KEY);r.onsuccess=function(e){res(e.target.result||null);};r.onerror=rej;});});}
function deleteFromIDB(){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(IDB_KEY);tx.oncomplete=res;tx.onerror=rej;});});}

window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').style.display='flex';});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}
window.addEventListener('appinstalled',function(){document.getElementById('install-banner').style.display='none';});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW:',e);});}

function norm(v){return String(v||'').trim().toUpperCase();}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(n){return(n||'?').trim().split(/\s+/).slice(0,2).map(function(w){return w||'';}).join('').toUpperCase()||'?';}

function parseDate(val){
  if(val===''||val===null||val===undefined)return '';
  if(typeof val=='string'){
    var s=val.trim();
    if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){var p=s.split('.');return p+'-'+p+'-'+p;}
    if(/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
    if(s==='00.00.0000'||s==='0.0.0'||s==='0')return '';
    return s;
  }
  if(typeof val==='number'){
    if(val===0)return '';
    try{var d=XLSX.SSF.parse_date_code(val);if(d)return pad(d.d)+'-'+pad(d.m)+'-'+d.y;}catch(e){}
    return String(val);
  }
  if(val instanceof Date)return pad(val.getDate())+'-'+pad(val.getMonth()+1)+'-'+val.getFullYear();
  return String(val);
}

function toJSDate(val){
  if(!val||val===''||val===0)return null;
  if(typeof val==='number'){try{var d=XLSX.SSF.parse_date_code(val);if(d)return new Date(d.y,d.m-1,d.d);}catch(e){}return null;}
  var s=String(val).trim();
  if(s==='00.00.0000'||s==='0.0.0'||s===''||s==='0')return null;
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){var p=s.split('.');return new Date(parseInt(p),parseInt(p)-1,parseInt(p));}
  if(/^\d{2}-\d{2}-\d{4}$/.test(s)){var p=s.split('-');return new Date(parseInt(p),parseInt(p)-1,parseInt(p));}
  var d=new Date(val);return isNaN(d.getTime())?null:d;
}

function getF(obj,keys){
  if(!obj)return '';
  var ok=Object.keys(obj);
  for(var i=0;i<keys.length;i++){var t=norm(keys[i]);var f=ok.find(function(k){return norm(k)===t;});if(f!==undefined){var v=obj[f];if(v!==''&&v!==undefined&&v!==null&&String(v).trim()!=='')return String(v);}}
  return '';
}
function getDF(obj,keys){
  if(!obj)return '';
  var ok=Object.keys(obj);
  for(var i=0;i<keys.length;i++){var t=norm(keys[i]);var f=ok.find(function(k){return norm(k)===t;});if(f!==undefined){var v=obj[f];if(v!==''&&v!==undefined&&v!==null)return parseDate(v);}}
  return '';
}
function cpfKey(row){
  var variants=['CPFNO','CPF NO','CPF_NO','CPF','CPFNUMBER'];
  var ok=Object.keys(row);
  for(var i=0;i<variants.length;i++){var f=ok.find(function(k){return norm(k)===variants[i];});if(f!==undefined&&row[f]!==''&&row[f]!==undefined)return norm(row[f]);}
  return '';
}
function findSheet(wb,patterns){
  for(var i=0;i<patterns.length;i++){var p=norm(patterns[i]);var sn=wb.SheetNames.find(function(s){return norm(s)===p||norm(s).indexOf(p)!==-1;});if(sn)return sn;}
  return null;
}
function setProgress(pct,msg,sub){
  document.getElementById('prog').style.width=pct+'%';
  if(msg)document.getElementById('load-msg').textContent=msg;
  if(sub!==undefined)document.getElementById('load-sub').textContent=sub;
}

function metaphone(word){
  word=word.toUpperCase().replace(/[^A-Z]/g,'');
  if(!word)return '';
  word=word.replace(/GH/g,'G').replace(/KH/g,'K').replace(/PH/g,'F').replace(/SH/g,'S').replace(/TH/g,'T').replace(/CH/g,'S');
  var code='',prev='',vocals='AEIOU';
  var map={B:'B',C:'S',D:'T',F:'F',G:'K',H:'',J:'J',K:'K',L:'L',M:'M',N:'N',P:'P',Q:'K',R:'R',S:'S',T:'T',V:'F',W:'',X:'KS',Y:'',Z:'S'};
  for(var i=0;i<word.length;i++){
    var c=word[i];
    if(vocals.indexOf(c)!==-1){if(i===0)code+='A';prev=c;continue;}
    var m=map[c]||'';
    if(m&&m!==prev){code+=m;prev=m;}
  }
  return code;
}
function soundex(s){
  s=s.toUpperCase().replace(/[^A-Z]/g,'');
  if(!s)return '';
  var map={B:'1',F:'1',P:'1',V:'1',C:'2',G:'2',J:'2',K:'2',Q:'2',S:'2',X:'2',Z:'2',D:'3',T:'3',L:'4',M:'5',N:'5',R:'6'};
  var code=s,prev=map[s]||'0';
  for(var i=1;i<s.length&&code.length<4;i++){var c=map[s[i]]||'0';if(c!=='0'&&c!==prev)code+=c;prev=c;}
  return (code+'000').slice(0,4);
}
function levenshtein(a,b){
  var m=a.length,n=b.length,dp=[],i,j;
  for(i=0;i<=m;i++){dp[i]=[i];}
  for(j=0;j<=n;j++){dp[j]=j;}
  for(i=1;i<=m;i++){for(j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}}
  return dp[m][n];
}

function processWorkbook(wb,fileName){
  var sn1=findSheet(wb,['Sheet1','Training','TRAINING','TRG'])||wb.SheetNames;
  var sn2=findSheet(wb,['Sheet2','Education','EDUCATION','EDU'])||wb.SheetNames;
  var sn3=findSheet(wb,['Sheet3','Employee','EMPLOYEES','EMP','MASTER'])||wb.SheetNames;
  var sn4=findSheet(wb,['Sheet4','Posting','POSTING','Promotion','PROMOTION','History'])||wb.SheetNames;

  setProgress(40,'Reading sheets…','');
  function readSheet(sn){if(!sn)return[];return XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});}
  var s1=readSheet(sn1),s2=readSheet(sn2),s3=readSheet(sn3),s4=readSheet(sn4);

  setProgress(70,'Indexing records…','');
  var empMap={},trainMap={},eduMap={},sheet4Map={};
  var nameIndex=[];

  s3.forEach(function(r){var c=cpfKey(r);if(c){empMap[c]=r;}});
  s1.forEach(function(r){var c=cpfKey(r);if(!c)return;if(!trainMap[c])trainMap[c]=[];trainMap[c].push(r);});
  s2.forEach(function(r){var c=cpfKey(r);if(!c)return;if(!eduMap[c])eduMap[c]=[];eduMap[c].push(r);});
  s4.forEach(function(r){var c=cpfKey(r);if(c)sheet4Map[c]=r;});

  var allCPFs={};
  Object.keys(empMap).forEach(function(c){allCPFs[c]=1;});
  Object.keys(sheet4Map).forEach(function(c){allCPFs[c]=1;});
  Object.keys(allCPFs).forEach(function(c){
    var r=empMap[c]||sheet4Map[c];
    if(!r)return;
    var name=getF(r,['NAME','EMPNAME','EMP_NAME']);
    if(!name)name=getF(sheet4Map[c]||{},['NAME']);
    if(!name)return;
    var words=name.trim().split(/\s+/);
    var sdx=words.map(function(w){return soundex(w);}).filter(Boolean);
    var mtf=words.map(function(w){return metaphone(w);}).filter(Boolean);
    nameIndex.push({
      name:name, cpf:c,
      desig:getF(r,['DESIGNATION','DESIG','DESIGN','POST','DESIGNATION TEXT']),
      level:getF(r,['LEVEL','LVL']),
      loc:getF(r,['LOCATION','LOC','LOCCD','PERSONAL AREA']),
      sdx:sdx, mtf:mtf, words:words.map(function(w){return w.toUpperCase();})
    });
  });

  db={empMap:empMap,trainMap:trainMap,eduMap:eduMap,sheet4Map:sheet4Map,nameIndex:nameIndex};
  setProgress(100,'Ready!','');
  setTimeout(function(){
    document.getElementById('loading-section').style.display='none';
    document.getElementById('upload-section').style.display='none';
    document.getElementById('main-section').style.display='block';
    document.getElementById('file-label').textContent='✓ Data Mapped Safely';
    document.getElementById('cpf-input').focus();
  },400);
}

function loadArrayBuffer(buf,fileName,saveCache){
  document.getElementById('upload-section').style.display='none';
  document.getElementById('loading-section').style.display='block';
  setProgress(5,'Reading file…','Processing records — please wait');
  setTimeout(function(){
    try{
      setProgress(20,'Parsing Excel…','');
      var wb=XLSX.read(buf,{type:'array',cellDates:false,raw:false});
      if(saveCache){saveToIDB(buf,fileName).catch(function(e){console.warn('IDB:',e);});}
      processWorkbook(wb,fileName);
    }catch(err){
      document.getElementById('loading-section').style.display='none';
      document.getElementById('upload-section').style.display='block';
      alert('Could not read file: '+err.message);
    }
  },50);
}

document.getElementById('file-input').addEventListener('change',function(e){
  var file=e.target.files;if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){loadArrayBuffer(ev.target.result,file.name,true);};
  reader.readAsArrayBuffer(file);
});

function reloadFile(){db=null;document.getElementById('main-section').style.display='none';document.getElementById('result-area').innerHTML='';document.getElementById('cpf-input').value='';document.getElementById('name-input').value='';document.getElementById('name-results').innerHTML='';document.getElementById('file-input').value='';checkCache();}
function clearCache(){if(!confirm('Remove cached file from this device?'))return;deleteFromIDB().then(function(){db=null;document.getElementById('main-section').style.display='none';document.getElementById('result-area').innerHTML='';document.getElementById('upload-section').style.display='block';document.getElementById('file-input').value='';});}
function toggleDebug(){var d=document.getElementById('debug-box');d.style.display=d.style.display==='block'?'none':'block';}

function checkCache(){
  document.getElementById('upload-section').style.display='block';
  loadFromIDB().then(function(rec){
    if(rec&&rec.buf)loadArrayBuffer(rec.buf,rec.name+' (cached '+rec.date+')',false);
  }).catch(function(){});
}
checkCache();

function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-cpf').className='mode-btn'+(mode==='cpf'?' active':'');
  document.getElementById('mode-name').className='mode-btn'+(mode==='name'?' active':'');
  document.getElementById('cpf-section').style.display=mode==='cpf'?'block':'none';
  document.getElementById('name-section').style.display=mode==='name'?'block':'none';
  document.getElementById('result-area').innerHTML='';
  if(mode==='name')document.getElementById('name-input').focus();
  else document.getElementById('cpf-input').focus();
}

function selectEmployee(cpf) {
  document.getElementById('cpf-input').value = cpf;
  setMode('cpf');
  doLookup();
}

function doNameSearch(){
  var q=document.getElementById('name-input').value.trim();
  var nr=document.getElementById('name-results');
  if(!db||q.length<2){nr.innerHTML='';return;}

  var words=q.toUpperCase().split(/\s+/).filter(Boolean);
  var qSdx=words.map(soundex);
  var qMtf=words.map(metaphone);

  var scored=[];
  db.nameIndex.forEach(function(emp){
    var score=0;
    words.forEach(function(w,i){
      if(emp.name.toUpperCase().indexOf(w)!==-1) score+=20;
      emp.words.forEach(function(ew){
        if(ew.indexOf(w)===0) score+=8;
        if(qMtf[i] && metaphone(ew)===qMtf[i]) score+=15;
        if(qSdx[i] && soundex(ew)===qSdx[i]) score+=10;
      });
    });
    if(score>0) scored.push({emp:emp,score:score});
  });

  var top200 = scored.sort(function(a,b){return b.score-a.score;}).slice(0,200);
  top200.forEach(function(item){
    words.forEach(function(w){
      item.emp.words.forEach(function(ew){
        var dist=levenshtein(w,ew);
        if(dist===1) item.score+=6;
        else if(dist===2&&w.length>=5) item.score+=3;
      });
    });
  });

  top200.sort(function(a,b){return b.score-a.score;});
  var top=top200.slice(0,20);

  if(!top.length){nr.innerHTML='<div class="empty">No matching employees found</div>';return;}

  function highlight(text, words){
    var result=esc(text);
    words.forEach(function(w){
      var re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
      result=result.replace(re,'<span class="highlight">$1</span>');
    });
    return result;
  }

  var html='<p style="font-size:11px;color:#aaa;margin-bottom:8px">'+top.length+' results — tap to view</p>';
  top.forEach(function(item){
    var e=item.emp;
    html+='<div class="name-result" onclick="selectEmployee(\''+esc(e.cpf)+'\')">';
    html+='<div class="name-result-name">'+highlight(e.name,words)+'</div>';
    html+='<div class="name-result-meta">';
    html+='<span class="name-tag cpf">'+esc(e.cpf)+'</span>';
    if(e.desig)html+='<span class="name-tag">'+esc(e.desig)+'</span>';
    if(e.level)html+='<span class="name-tag">'+esc(e.level)+'</span>';
    if(e.loc)html+='<span class="name-tag">📍'+esc(e.loc)+'</span>';
    html+='</div></div>';
  });
  nr.innerHTML=html;
}

function doLookup() {
  var rawCpf=document.getElementById('cpf-input').value.trim();
  var area=document.getElementById('result-area');
  if(!db){alert('Please load data file first'); return;}
  if(!rawCpf){area.innerHTML=''; return;}
  
  var targetCpf=norm(rawCpf);
  var master=db.empMap[targetCpf]||db.sheet4Map[targetCpf];
  
  if(!master){
    area.innerHTML='<div class="card"><div class="empty">No master file entry found for CPF: '+esc(targetCpf)+'</div></div>';
    return;
  }

  var name=getF(master,['NAME','EMPNAME','EMP_NAME']);
  var desig=getF(master,['DESIGNATION','DESIG','DESIGN','POST']);
  var level=getF(master,['LEVEL','LVL']);
  var loc=getF(master,['LOCATION','LOC','LOCCD']);

  var html='<div class="card">';
  html+='<div class="emp-top">';
  html+='<div class="avatar">'+initials(name)+'</div>';
  html+='<div><div class="emp-name">'+esc(name)+'</div><div class="emp-desig">'+esc(desig)+'</div></div>';
  html+='</div>';
  
  html+='<div class="emp-meta">';
  html+='<div class="meta-item"><label>CPF Number</label><span>'+esc(targetCpf)+'</span></div>';
  html+='<div class="meta-item"><label>Current Level</label><span>'+esc(level||'N/A')+'</span></div>';
  html+='<div class="meta-item full"><label>Current Location</label><span>📍 '+esc(loc||'N/A')+'</span></div>';
  html+='</div></div>';

  var h=db.sheet4Map[targetCpf];
  if(h){
    html+='<div class="card">';
    html+='<h3>📅 Milestone Chronology</h3>';
    html+='<div class="dates-grid">';
    if(getDF(h,['DATE OF BIRTH'])) html+='<div class="date-box"><label>DOB</label><span>'+getDF(h,['DATE OF BIRTH'])+'</span></div>';
    if(getDF(h,['DATE OF JOIN ONGC'])) html+='<div class="date-box"><label>Join ONGC</label><span>'+getDF(h,['DATE OF JOIN ONGC'])+'</span></div>';
    if(getDF(h,['DATE OF JOIN PER AREA'])) html+='<div class="date-box"><label>Join Per Area</label><span>'+getDF(h,['DATE OF JOIN PER AREA'])+'</span></div>';
    if(getDF(h,['DATE OF JOIN POST'])) html+='<div class="date-box"><label>Join Post</label><span>'+getDF(h,['DATE OF JOIN POST'])+'</span></div>';
    if(getDF(h,['EFF DATE PROM'])) html+='<div class="date-box"><label>Eff Date Prom</label><span>'+getDF(h,['EFF DATE PROM'])+'</span></div>';
    if(getDF(h,['DATE OF RETIREMENT'])) html+='<div class="date-box"><label>Retirement</label><span>'+getDF(h,['DATE OF RETIREMENT'])+'</span></div>';
    html+='</div></div>';

    // Parse Wide Posting Columns Dynamic Loop
    var postingHtml='';
    for(var i=1;i<=10;i++){
      var pKey=i===1?'POSTING1':'POSTING'+i;
      var wKey=i===1?'W.E.F':'WEF_'+i;
      
      // Fallback lookup step for alternative formatting styles
      if(i>1 && h['W.E.F_'+i]!==undefined) wKey='W.E.F_'+i;
      if(h[pKey]===undefined){
        var keys=Object.keys(h);
        var fIdx=keys.find(function(k){return norm(k)==='POSTING'+i;});
        if(fIdx) pKey=fIdx;
      }

      var locVal=String(h[pKey]||'').trim();
      var wefVal=parseDate(h[wKey]);

      if(locVal && locVal!=='00.00.0000' && locVal!=='0' && locVal!=='0.0.0'){
        postingHtml+='<div class="tl-item"><div class="tl-dot"></div><div class="tl-content">';
        postingHtml+='<div class="tl-title">📍 '+esc(locVal)+'</div>';
        if(wefVal) postingHtml+='<div class="tl-date">w.e.f. '+esc(wefVal)+'</div>';
        postingHtml+='</div></div>';
      }
    }
    if(postingHtml){
      html+='<div class="card"><h3>📋 Posting Changes Timeline</h3><div class="timeline">'+postingHtml+'</div></div>';
    }

    // Parse Wide Level Columns Dynamic Loop
    var levelHtml='';
    for(var j=1;j<=10;j++){
      var lKey='LEVEL'+j;
      var lwKey=j===1?'Level W.E.F':'Level W.E.F_'+j;
      
      if(j>1 && h['Level W.E.F_'+j]!==undefined) lwKey='Level W.E.F_'+j;

      var lvlVal=String(h[lKey]||'').trim();
      var lvlWef=parseDate(h[lwKey]);

      if(lvlVal && lvlVal!=='00.00.0000' && lvlVal!=='0' && lvlVal!=='0.0.0'){
        levelHtml+='<div class="tl-item"><div class="tl-dot"></div><div class="tl-content">';
        levelHtml+='<div class="tl-badge">Grade '+esc(lvlVal)+'</div>';
        if(lvlWef) levelHtml+='<div class="tl-date">Effective Date: '+esc(lvlWef)+'</div>';
        levelHtml+='</div></div>';
      }
    }
    if(levelHtml){
      html+='<div class="card"><h3>📈 Promotion & Scale History</h3><div class="timeline">'+levelHtml+'</div></div>';
    }
  }

  // Education Block
  var edu=db.eduMap[targetCpf]||[];
  html+='<div class="card"><h3>🎓 Education Profiles</h3>';
  if(!edu.length) html+='<div class="empty">No recorded education dataset listed</div>';
  else {
    edu.forEach(function(ed){
      html+='<div class="record">';
      html+='<div class="rec-title">'+esc(ed.QSTDTXT||ed.QUALXT)+'</div>';
      if(ed.SUBTXT) html+='<div class="rec-sub">Subject: '+esc(ed.SUBTXT)+'</div>';
      if(ed.UNIVTEXT) html+='<div class="rec-univ">'+esc(ed.UNIVTEXT)+'</div>';
      if(ed.CERTDATE) html+='<div class="rec-dates"><div class="date-item"><label>Certificate Issued</label><span>'+parseDate(ed.CERTDATE)+'</span></div></div>';
      html+='</div>';
    });
  }
  html+='</div>';

  // Training Block (With Filter)
  var trg=db.trainMap[targetCpf]||[];
  var cutoffYrs=parseFloat(document.getElementById('years-input').value)||5;
  var today=new Date();
  
  html+='<div class="card"><h3>🏋️ Completed Training Ledgers</h3>';
  var validTrgCount=0;
  
  var trgHtml='';
  trg.forEach(function(t){
    var targetDate=toJSDate(t.DATE2);
    var skip=false;
    if(targetDate){
      var diffTime=Math.abs(today-targetDate);
      var diffYrs=diffTime/(1000*60*60*24*365.25);
      if(diffYrs>cutoffYrs) skip=true;
    }
    if(!skip){
      validTrgCount++;
      trgHtml+='<div class="record">';
      trgHtml+='<div class="rec-title">'+esc(t.TRG)+'</div>';
      if(t.TRGNO) html+='<div class="rec-code">Code: '+esc(t.TRGNO)+'</div>';
      trgHtml+='<div class="rec-dates">';
      trgHtml+='<div class="date-item"><label>From</label><span>'+parseDate(t.DATE1)+'</span></div>';
      trgHtml+='<div class="date-item"><label>To Date</label><span>'+parseDate(t.DATE2)+'</span></div>';
      trgHtml+='</div></div>';
    }
  });

  if(!validTrgCount) html+='<div class="empty">No courses found within the last '+cutoffYrs+' years</div>';
  else html+=trgHtml;
  html+='</div>';

  area.innerHTML=html;
}
</script>
