<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Employee Lookup</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:16px}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:#666;margin-bottom:20px}
  .btn{padding:10px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
  .btn:active{opacity:.75}
  .btn-outline{padding:8px 14px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:12px;cursor:pointer}
  .btn-link{background:none;border:none;color:#378ADD;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
  input[type=text],input[type=search]{width:100%;padding:10px 14px;font-size:14px;border:1px solid #ddd;border-radius:10px;background:#fff;outline:none;font-family:inherit}
  input[type=text]:focus,input[type=search]:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.12)}
  .cpf-input{letter-spacing:.05em;text-transform:uppercase;font-family:monospace}
  .search-row{display:flex;gap:8px;margin-bottom:10px}
  .search-row input{flex:1}
  
  /* Cards */
  .card{background:#fff;border-radius:14px;border:1px solid #eee;padding:16px;margin-bottom:12px}
  .emp-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .avatar{width:46px;height:46px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#185FA5;flex-shrink:0}
  .emp-info-block{display:flex;flex-direction:column;gap:2px}
  .emp-name{font-size:15px;font-weight:600;line-height:1.3}
  .emp-desig{font-size:12px;color:#666}
  
  .emp-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;padding-top:12px;border-top:1px solid #f0f0f0}
  .meta-item label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
  .meta-item span{font-size:13px;font-weight:500}
  .meta-item.full{grid-column:1/-1}
  
  /* Tabs Layout System */
  .tabs{display:flex;border-bottom:1px solid #e5e5e5;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1;text-align:center;padding:12px 8px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#777;white-space:nowrap}
  .tab.active{color:#378ADD;border-bottom-color:#378ADD}
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* Timelines & Records */
  .dates-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
  .date-box label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
  .date-box span{font-size:12px;font-weight:500}
  
  .timeline{position:relative;padding-left:16px;margin-top:8px}
  .timeline::before{content:'';position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:#e5e5e5}
  .tl-item{position:relative;margin-bottom:12px}
  .tl-dot{position:absolute;left:-16px;top:4px;width:8px;height:8px;border-radius:50%;background:#378ADD;border:2px solid #fff}
  .tl-content{background:#f8f9fa;border-radius:8px;padding:8px 12px;border:1px solid #eee}
  .tl-title{font-size:13px;font-weight:600}
  .tl-date{font-size:11px;color:#666;margin-top:2px}
  .tl-badge{display:inline-block;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:600;border-radius:4px;padding:2px 6px;margin-bottom:2px}

  .record{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px}
  .rec-title{font-size:13px;font-weight:600;margin-bottom:3px}
  .rec-sub{font-size:12px;color:#555}
  .rec-univ{font-size:12px;color:#378ADD;font-style:italic}
  .rec-dates{font-size:11px;color:#666;margin-top:4px;padding-top:4px;border-top:1px solid #f5f5f5}

  /* Fixed Search Row Layout */
  .name-result{background:#fff;border:1px solid #eee;border-radius:11px;padding:12px;margin-bottom:8px;cursor:pointer}
  .name-result:active{background:#f0f7ff;border-color:#378ADD}
  .name-result-name{font-size:13px;font-weight:600;margin-bottom:6px}
  .name-result-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .name-tag{font-size:11px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:5px;padding:2px 6px;color:#555;white-space:nowrap}
  .name-tag.cpf{background:#E6F1FB;color:#185FA5;border-color:#B3D4F5;font-family:monospace;font-weight:600}

  .empty{text-align:center;padding:20px 0;color:#999;font-size:13px}
  .drop-zone{border:2px dashed #ccc;border-radius:14px;padding:32px 16px;text-align:center;background:#fff;cursor:pointer;margin-bottom:12px}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-wrap{background:#f0f0f0;border-radius:4px;height:6px;margin:12px 0;overflow:hidden}
  .progress-bar{height:100%;background:#378ADD;width:0%;transition:width .2s}
  .file-bar{background:#E8F5E9;border:1px solid #C8E6C9;border-radius:10px;padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .file-bar span{font-size:12px;color:#2E7D32}
  .file-bar-btns{display:flex;gap:6px}
  .debug-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:12px;font-size:11px;font-family:monospace;display:none;white-space:pre-wrap}
  .mode-toggle{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:12px;gap:4px}
  .mode-btn{flex:1;padding:8px;font-size:12px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666}
  .mode-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .years-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:8px 12px;margin-bottom:10px}
  .years-bar input{width:48px;padding:4px;font-size:13px;text-align:center;border:1px solid #ddd;border-radius:6px}
  .highlight{background:#fff3cd;padding:0 1px}
</style>
</head>
<body>
<div class="app">
  <h1>👤 Employee Lookup</h1>
  <p class="sub">ONGC Internal Records Dashboard</p>

  <div id="upload-section">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <p style="font-size:28px; margin-bottom:8px;">📊</p>
      <div style="font-weight:600; font-size:15px;">Load master spreadsheet data</div>
      <div style="font-size:12px; color:#666; margin-top:4px;">Supports standard parsed workbook pages</div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xlsm,.xls" style="display:none">
  </div>

  <div id="loading-section" style="display:none">
    <div class="card" style="text-align:center;">
      <div class="spinner"></div>
      <p id="load-msg" style="font-size:14px; margin-top:8px;">Mapping structural files...</p>
      <div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>
    </div>
  </div>

  <div id="main-section" style="display:none">
    <div class="file-bar">
      <span id="file-label">✓ Datasets synchronized offline</span>
      <div class="file-bar-btns">
        <button class="btn-outline" onclick="reloadFile()">🔄 Update</button>
        <button class="btn-outline" onclick="clearCache()" style="color:#c00">✕</button>
      </div>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-cpf" onclick="setMode('cpf')">🔢 Search by CPF</button>
      <button class="mode-btn" id="mode-name" onclick="setMode('name')">🔤 Search by Name</button>
    </div>

    <div id="cpf-section">
      <div class="search-row">
        <input type="text" id="cpf-input" class="cpf-input" placeholder="Enter target CPF index" maxlength="8" onkeydown="if(event.key==='Enter')doLookup()">
        <button class="btn" onclick="doLookup()">Search</button>
      </div>
      <div class="years-bar">
        <span style="flex:1; font-size:12px; color:#555;">📅 Limit training window</span>
        <input type="number" id="years-input" value="5" min="1" max="99" onchange="if(db && document.getElementById('result-area').innerHTML) doLookup()">
        <span style="font-size:12px; color:#555;">years</span>
      </div>
    </div>

    <div id="name-section" style="display:none">
      <div class="search-row">
        <input type="search" id="name-input" placeholder="Type name string..." oninput="doNameSearch()">
      </div>
      <div id="name-results"></div>
    </div>

    <button class="btn-link" onclick="toggleDebug()" style="margin:8px 0; display:block">🔍 Run Diagnostics Window</button>
    <div class="debug-box" id="debug-box"></div>
    
    <div id="result-area"></div>
  </div>
</div>

<script>
var db=null, currentMode='cpf';
var IDB_NAME='EmpLookupDB2', IDB_STORE='files', IDB_KEY='excel';

function openIDB(){return new Promise(function(res,rej){var r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=function(e){e.target.result.createObjectStore(IDB_STORE);};r.onsuccess=function(e){res(e.target.result);};r.onerror=rej;});}
function saveToIDB(buf,name){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put({buf:buf,name:name,date:new Date().toLocaleDateString()},IDB_KEY);tx.oncomplete=res;tx.onerror=rej;});});}
function loadFromIDB(){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readonly');var r=tx.objectStore(IDB_STORE).get(IDB_KEY);r.onsuccess=function(e){res(e.target.result||null);};r.onerror=rej;});});}
function deleteFromIDB(){return openIDB().then(function(idb){return new Promise(function(res,rej){var tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(IDB_KEY);tx.oncomplete=res;tx.onerror=rej;});});}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(e){console.warn(e);});}

function norm(v){return String(v||'').trim().toUpperCase();}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(n){return(n||'?').trim().split(/\s+/).slice(0,2).map(function(w){return w||'';}).join('').toUpperCase()||'?';}

function parseDate(val){
  if(val===''||val===null||val===undefined)return '';
  if(typeof val==='string'){
    var s=val.trim();
    if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){var p=s.split('.');return p+'-'+p+'-'+p;}
    if(/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
    if(s==='00.00.0000'||s==='0.0.0'||s==='0')return '';
    return s;
  }
  if(typeof val==='number'){
    if(val===0)return '';
    try{var d=XLSX.SSF.parse_date_code(val);if(d)return pad(d.d)+'-'+pad(d.m)+'-'+d.y;}catch(e){}
    return String(val);
  }
  return '';
}

function toJSDate(val){
  if(!val||val===''||val===0)return null;
  if(typeof val==='number'){try{var d=XLSX.SSF.parse_date_code(val);if(d)return new Date(d.y,d.m-1,d.d);}catch(e){}return null;}
  var s=String(val).trim();
  if(s==='00.00.0000'||s==='0.0.0'||s===''||s==='0')return null;
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){var p=s.split('.');return new Date(parseInt(p),parseInt(p)-1,parseInt(p));}
  if(/^\d{2}-\d{2}-\d{4}$/.test(s)){var p=s.split('-');return new Date(parseInt(p),parseInt(p)-1,parseInt(p));}
  return null;
}

function getF(obj,keys){
  if(!obj)return '';
  var ok=Object.keys(obj);
  for(var i=0;i<keys.length;i++){var t=norm(keys[i]);var f=ok.find(function(k){return norm(k)===t;});if(f!==undefined){var v=obj[f];if(v!==''&&v!==undefined&&v!==null)return String(v).trim();}}
  return '';
}
function getDF(obj,keys){
  var raw=getF(obj,keys);
  return raw?parseDate(raw):'';
}
function cpfKey(row){
  var variants=['CPFNO','CPF NO','CPF_NO','CPF','CPFNUMBER'];
  var ok=Object.keys(row);
  for(var i=0;i<variants.length;i++){var f=ok.find(function(k){return norm(k)===variants[i];});if(f!==undefined&&row[f]!==''&&row[f]!==undefined)return norm(row[f]);}
  return '';
}
function findSheet(wb,patterns){
  for(var i=0;i<patterns.length;i++){var p=norm(patterns[i]);var sn=wb.SheetNames.find(function(s){return norm(s)===p||norm(s).indexOf(p)!==-1;});if(sn)return sn;}
  return null;
}
function setProgress(pct,msg){
  document.getElementById('prog').style.width=pct+'%';
  if(msg)document.getElementById('load-msg').textContent=msg;
}

function metaphone(word){
  word=word.toUpperCase().replace(/[^A-Z]/g,'');
  if(!word)return '';
  word=word.replace(/GH/g,'G').replace(/KH/g,'K').replace(/PH/g,'F').replace(/SH/g,'S').replace(/TH/g,'T').replace(/CH/g,'S');
  var code='',prev='',vocals='AEIOU';
  var map={B:'B',C:'S',D:'T',F:'F',G:'K',H:'',J:'J',K:'K',L:'L',M:'M',N:'N',P:'P',Q:'K',R:'R',S:'S',T:'T',V:'F',W:'',X:'KS',Y:'',Z:'S'};
  for(var i=0;i<word.length;i++){
    var c=word[i];
    if(vocals.indexOf(c)!==-1){if(i===0)code+='A';prev=c;continue;}
    var m=map[c]||'';
    if(m&&m!==prev){code+=m;prev=m;}
  }
  return code;
}
function soundex(s){
  s=s.toUpperCase().replace(/[^A-Z]/g,'');
  if(!s)return '';
  var map={B:'1',F:'1',P:'1',V:'1',C:'2',G:'2',J:'2',K:'2',Q:'2',S:'2',X:'2',Z:'2',D:'3',T:'3',L:'4',M:'5',N:'5',R:'6'};
  var code=s,prev=map[s]||'0';
  for(var i=1;i<s.length&&code.length<4;i++){var c=map[s[i]]||'0';if(c!=='0'&&c!==prev)code+=c;prev=c;}
  return (code+'000').slice(0,4);
}
function levenshtein(a,b){
  var m=a.length,n=b.length,dp=[],i,j;
  for(i=0;i<=m;i++){dp[i]=[i];}
  for(j=0;j<=n;j++){dp[j]=j;}
  for(i=1;i<=m;i++){for(j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}}
  return dp[m][n];
}

function processWorkbook(wb,fileName){
  var sn1=findSheet(wb,['Sheet1','Training','TRAINING','TRG'])||wb.SheetNames;
  var sn2=findSheet(wb,['Sheet2','Education','EDUCATION','EDU'])||wb.SheetNames;
  var sn3=findSheet(wb,['Sheet3','Employee','EMPLOYEES','EMP','MASTER'])||wb.SheetNames;
  var sn4=findSheet(wb,['Sheet4','Posting','POSTING','Promotion','PROMOTION','History'])||wb.SheetNames;

  var dInf='=== SHEET DISTRIBUTION ===\n1:'+sn1+'\n2:'+sn2+'\n3:'+sn3+'\n4:'+sn4;
  document.getElementById('debug-box').textContent=dInf;

  setProgress(50,'Mapping memory storage references...');
  function readSheet(sn){if(!sn)return[];return XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});}
  var s1=readSheet(sn1), s2=readSheet(sn2), s3=readSheet(sn3), s4=readSheet(sn4);

  var empMap={}, trainMap={}, eduMap={}, sheet4Map={};
  var nameIndex=[];

  s3.forEach(function(r){var c=cpfKey(r);if(c){empMap[c]=r;}});
  s1.forEach(function(r){var c=cpfKey(r);if(!c)return;if(!trainMap[c])trainMap[c]=[];trainMap[c].push(r);});
  s2.forEach(function(r){var c=cpfKey(r);if(!c)return;if(!eduMap[c])eduMap[c]=[];eduMap[c].push(r);});
  s4.forEach(function(r){var c=cpfKey(r);if(c)sheet4Map[c]=r;});

  var allCPFs={};
  Object.keys(empMap).forEach(function(c){allCPFs[c]=1;});
  Object.keys(sheet4Map).forEach(function(c){allCPFs[c]=1;});
  Object.keys(allCPFs).forEach(function(c){
    var r=empMap[c]||sheet4Map[c];
    if(!r)return;
    var name=getF(r,['NAME','EMPNAME','EMP_NAME']);
    if(!name)name=getF(sheet4Map[c]||{},['NAME']);
    if(!name)return;
    var words=name.trim().split(/\s+/);
    nameIndex.push({
      name:name, cpf:c,
      desig:getF(r,['DESIGNATION','DESIG','DESIGN','POST']),
      level:getF(r,['LEVEL','LVL']),
      loc:getF(r,['LOCATION','LOC','LOCCD']),
      sdx:words.map(soundex).filter(Boolean), 
      mtf:words.map(metaphone).filter(Boolean), 
      words:words.map(function(w){return w.toUpperCase();})
    });
  });

  db={empMap:empMap,trainMap:trainMap,eduMap:eduMap,sheet4Map:sheet4Map,nameIndex:nameIndex};
  setProgress(100,'Ready');
  setTimeout(function(){
    document.getElementById('loading-section').style.display='none';
    document.getElementById('upload-section').style.display='none';
    document.getElementById('main-section').style.display='block';
  },300);
}

function loadArrayBuffer(buf,fileName,saveCache){
  document.getElementById('upload-section').style.display='none';
  document.getElementById('loading-section').style.display='block';
  setProgress(20,'Unzipping binary assets...');
  setTimeout(function(){
    try{
      var wb=XLSX.read(buf,{type:'array',cellDates:false,raw:false});
      if(saveCache){saveToIDB(buf,fileName).catch(function(e){console.warn(e);});}
      processWorkbook(wb,fileName);
    }catch(err){
      document.getElementById('loading-section').style.display='none';
      document.getElementById('upload-section').style.display='block';
      alert('Error: '+err.message);
    }
  },50);
}

document.getElementById('file-input').addEventListener('change',function(e){
  var file=e.target.files;if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){loadArrayBuffer(ev.target.result,file.name,true);};
  reader.readAsArrayBuffer(file);
});

function reloadFile(){db=null;document.getElementById('main-section').style.display='none';document.getElementById('result-area').innerHTML='';document.getElementById('file-input').value='';checkCache();}
function clearCache(){if(!confirm('Clear client cache?'))return;deleteFromIDB().then(function(){location.reload();});}
function toggleDebug(){var d=document.getElementById('debug-box');d.style.display=d.style.display==='block'?'none':'block';}

function checkCache(){
  loadFromIDB().then(function(rec){
    if(rec&&rec.buf)loadArrayBuffer(rec.buf,rec.name,false);
  }).catch(function(){});
}
checkCache();

function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-cpf').className='mode-btn'+(mode==='cpf'?' active':'');
  document.getElementById('mode-name').className='mode-btn'+(mode==='name'?' active':'');
  document.getElementById('cpf-section').style.display=mode==='cpf'?'block':'none';
  document.getElementById('name-section').style.display=mode==='name'?'block':'none';
}

function selectEmployee(cpf) {
  document.getElementById('cpf-input').value = cpf;
  setMode('cpf');
  doLookup();
}

function doNameSearch(){
  var q=document.getElementById('name-input').value.trim();
  var nr=document.getElementById('name-results');
  if(!db||q.length<2){nr.innerHTML='';return;}

  var words=q.toUpperCase().split(/\s+/).filter(Boolean);
  var qSdx=words.map(soundex), qMtf=words.map(metaphone);
  var scored=[];

  db.nameIndex.forEach(function(emp){
    var score=0;
    words.forEach(function(w,i){
      if(emp.name.toUpperCase().indexOf(w)!==-1) score+=20;
      emp.words.forEach(function(ew){
        if(ew.indexOf(w)===0) score+=8;
        if(qMtf[i] && metaphone(ew)===qMtf[i]) score+=15;
        if(qSdx[i] && soundex(ew)===qSdx[i]) score+=10;
      });
    });
    if(score>0) scored.push({emp:emp,score:score});
  });

  scored.sort(function(a,b){return b.score-a.score;});
  var top=scored.slice(0,15);
  if(!top.length){nr.innerHTML='<div class="empty">No candidates match</div>';return;}

  var html='';
  top.forEach(function(item){
    var e=item.emp;
    html+='<div class="name-result" onclick="selectEmployee(\''+esc(e.cpf)+'\')">';
    html+='<div class="name-result-name">'+esc(e.name)+'</div>';
    html+='<div class="name-result-meta">';
    html+='<span class="name-tag cpf">'+esc(e.cpf)+'</span>';
    if(e.desig) html+='<span class="name-tag">'+esc(e.desig)+'</span>';
    if(e.level) html+='<span class="name-tag">'+esc(e.level)+'</span>';
    if(e.loc) html+='<span class="name-tag">📍 '+esc(e.loc)+'</span>';
    html+='</div></div>';
  });
  nr.innerHTML=html;
}

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  
  var targetTab = document.querySelector('[onclick="switchTab(\''+tabId+'\')"]');
  if(targetTab) targetTab.classList.add('active');
  
  var targetContent = document.getElementById(tabId);
  if(targetContent) targetContent.classList.add('active');
}

function doLookup() {
  var rawCpf=document.getElementById('cpf-input').value.trim();
  var area=document.getElementById('result-area');
  if(!db||!rawCpf){area.innerHTML=''; return;}
  
  var targetCpf=norm(rawCpf);
  var master=db.empMap[targetCpf]||db.sheet4Map[targetCpf];
  
  if(!master){
    area.innerHTML='<div class="card"><div class="empty">CPF Index code not tracked</div></div>';
    return;
  }

  var name=getF(master,['NAME','EMPNAME','EMP_NAME']);
  var desig=getF(master,['DESIGNATION','DESIG','DESIGN','POST']);
  var level=getF(master,['LEVEL','LVL']);
  var loc=getF(master,['LOCATION','LOC','LOCCD']);

  // Base Header Container Card
  var html='<div class="card">';
  html+='<div class="emp-top">';
  html+='<div class="avatar">'+initials(name)+'</div>';
  html+='<div class="emp-info-block"><div class="emp-name">'+esc(name)+'</div><div class="emp-desig">'+esc(desig)+'</div></div>';
  html+='</div>';
  html+='<div class="emp-meta">';
  html+='<div class="meta-item"><label>CPF Code</label><span>'+esc(targetCpf)+'</span></div>';
  html+='<div class="meta-item"><label>Scale Grade</label><span>'+esc(level||'N/A')+'</span></div>';
  html+='<div class="meta-item full"><label>Assigned Station</label><span>📍 '+esc(loc||'N/A')+'</span></div>';
  html+='</div></div>';

  // Interactive Modular Tab Selection Headings
  html+='<div class="tabs">';
  html+='<button class="tab active" onclick="switchTab(\'tab-personnel\')">Personnel</button>';
  html+='<button class="tab" onclick="switchTab(\'tab-timeline\')">Timeline</button>';
  html+='<button class="tab" onclick="switchTab(\'tab-education\')">Education</button>';
  html+='<button class="tab" onclick="switchTab(\'tab-training\')">Training</button>';
  html+='</div>';

  var h=db.sheet4Map[targetCpf]||{};

  // TAB 1: Personnel Milestones
  html+='<div id="tab-personnel" class="tab-content active"><div class="card">';
  html+='<div class="dates-grid">';
  html+='<div class="date-box"><label>DOB</label><span>'+(getDF(h,['DATE OF BIRTH'])||'N/A')+'</span></div>';
  html+='<div class="date-box"><label>ONGC Induction</label><span>'+(getDF(h,['DATE OF JOIN ONGC'])||'N/A')+'</span></div>';
  html+='<div class="date-box"><label>Area Entry</label><span>'+(getDF(h,['DATE OF JOIN PER AREA'])||'N/A')+'</span></div>';
  html+='<div class="date-box"><label>Current Post WEF</label><span>'+(getDF(h,['DATE OF JOIN POST'])||'N/A')+'</span></div>';
  html+='<div class="date-box"><label>Last Promotion</label><span>'+(getDF(h,['EFF DATE PROM'])||'N/A')+'</span></div>';
  html+='<div class="date-box"><label>Retirement</label><span>'+(getDF(h,['DATE OF RETIREMENT'])||'N/A')+'</span></div>';
  html+='</div></div></div>';

// TAB 2: Dynamic Chronology Tracking (Postings & Grades)
  html+='<div id="tab-timeline" class="tab-content"><div class="card">';
  
  var trackingHtml='';

  // 1. Explicit Column Mapping Strategy for Postings (S to AJ)
  // S=POSTING1, T=WEF1, U=POSTING2, V=WEF2, etc.
  var postingCols = ['S', 'U', 'W', 'Y', 'AA', 'AC', 'AE', 'AG', 'AI'];
  var wefCols     = ['T', 'V', 'X', 'Z', 'AB', 'AD', 'AF', 'AH', 'AJ'];

  for(var i=0; i<postingCols.length; i++) {
    var pVal = String(h[postingCols[i]] || '').trim();
    var wVal = parseDate(h[wefCols[i]]);
    
    if(pVal && pVal !== '0' && pVal !== '00.00.0000') {
      trackingHtml+='<div class="tl-item"><div class="tl-dot"></div><div class="tl-content">';
      trackingHtml+='<div class="tl-title">📍 '+esc(pVal)+'</div>';
      if(wVal) trackingHtml+='<div class="tl-date">w.e.f. '+esc(wVal)+'</div>';
      trackingHtml+='</div></div>';
    }
  }

  // 2. Explicit Column Mapping Strategy for Levels (AK to BD)
  // AK=LEVEL1, AL=WEF1, AM=LEVEL2, AN=WEF2, etc.
  var levelCols    = ['AK', 'AM', 'AO', 'AQ', 'AS', 'AU', 'AW', 'AY', 'BA', 'BC'];
  var levelWefCols = ['AL', 'AN', 'AP', 'AR', 'AT', 'AV', 'AX', 'AZ', 'BB', 'BD'];

  for(var j=0; j<levelCols.length; j++) {
    var lVal  = String(h[levelCols[j]] || '').trim();
    var lwVal = parseDate(h[levelWefCols[j]]);

    if(lVal && lVal !== '0' && lVal !== '00.00.0000') {
      trackingHtml+='<div class="tl-item"><div class="tl-dot"></div><div class="tl-content">';
      trackingHtml+='<div class="tl-badge">Grade '+esc(lVal)+'</div>';
      if(lwVal) trackingHtml+='<div class="tl-date">Effective Date: '+esc(lwVal)+'</div>';
      trackingHtml+='</div></div>';
    }
  }

  if(!trackingHtml) html+='<div class="empty">No progression history logs populated</div>';
  else html+='<div class="timeline">'+trackingHtml+'</div>';
  html+='</div></div>';

  // Levels Loop
  for(var j=1;j<=10;j++){
    var lKey='LEVEL'+j;
    var lwKey=j===1?'Level W.E.F':'Level W.E.F_'+j;
    if(j>1 && h['Level W.E.F_'+j]!==undefined) lwKey='Level W.E.F_'+j;

    var lVal=String(h[lKey]||'').trim();
    var lwVal=getDF(h,[lwKey]);

    if(lVal && lVal!=='0' && lVal!=='00.00.0000'){
      trackingHtml+='<div class="tl-item"><div class="tl-dot"></div><div class="tl-content">';
      trackingHtml+='<div class="tl-badge">Grade '+esc(lVal)+'</div>';
      if(lwVal) trackingHtml+='<div class="tl-date">Effective Date: '+esc(lwVal)+'</div>';
      trackingHtml+='</div></div>';
    }
  }

  if(!trackingHtml) html+='<div class="empty">No progression history logs populated</div>';
  else html+='<div class="timeline">'+trackingHtml+'</div>';
  html+='</div></div>';

  // TAB 3: Academic Accreditations
  var edu=db.eduMap[targetCpf]||[];
  html+='<div id="tab-education" class="tab-content">';
  if(!edu.length) html+='<div class="card"><div class="empty">No educational records logged</div></div>';
  else {
    edu.forEach(function(ed){
      html+='<div class="record">';
      html+='<div class="rec-title">'+esc(ed.QSTDTXT||ed.QUALXT||'Degree Certificate')+'</div>';
      if(ed.SUBTXT) html+='<div class="rec-sub">Subject: '+esc(ed.SUBTXT)+'</div>';
      if(ed.UNIVTEXT) html+='<div class="rec-univ">'+esc(ed.UNIVTEXT)+'</div>';
      var edDate=getDF(ed,['CERTDATE']);
      if(edDate) html+='<div class="rec-dates">Issued Date: '+esc(edDate)+'</div>';
      html+='</div>';
    });
  }
  html+='</div>';

  // TAB 4: Corporate Training Record Indexes
  var trg=db.trainMap[targetCpf]||[];
  var cutoffYrs=parseFloat(document.getElementById('years-input').value)||5;
  var today=new Date();

  html+='<div id="tab-training" class="tab-content">';
  var validTrgCount=0;
  
  trg.forEach(function(t){
    var targetDate=toJSDate(t.DATE2);
    var skip=false;
    if(targetDate){
      var diffYrs=Math.abs(today-targetDate)/(1000*60*60*24*365.25);
      if(diffYrs>cutoffYrs) skip=true;
    }
    if(!skip){
      validTrgCount++;
      html+='<div class="record">';
      html+='<div class="rec-title">'+esc(t.TRG)+'</div>';
      if(t.TRGNO) html+='<div class="rec-sub" style="font-family:monospace; color:#888;">Module ID: '+esc(t.TRGNO)+'</div>';
      html+='<div class="rec-dates">Duration: '+getDF(t,['DATE1'])+' to '+getDF(t,['DATE2'])+'</div>';
      html+='</div>';
    }
  });

  if(!validTrgCount) html+='<div class="card"><div class="empty">No courses tracked inside the last '+cutoffYrs+' years</div></div>';
  html+='</div>';

  area.innerHTML=html;
}
</script>
</body>
</html>
